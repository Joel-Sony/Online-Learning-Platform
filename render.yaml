# Render Blueprint Specification
# This file lets you deploy the entire architecture (PostgreSQL, Redis, Daphne ASGI, React Frontend)
# on Render.com with a single click.

services:
  # 1. Backend Web Service running ASGI Daphne (HTTP + WebSockets)
  - type: web
    name: learning-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # migrate + collectstatic must succeed (&&); the demo-seed commands are
    # best-effort (|| true) so a seeding hiccup can never block the release.
    startCommand: >-
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      (python manage.py generate_all_content || true) &&
      (python manage.py download_thumbnails || true) &&
      (python manage.py create_admin || true) &&
      daphne -b 0.0.0.0 -p $PORT core.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: learning-platform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: learning-platform-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DJANGO_ADMIN_PASSWORD
        sync: false

      # ── Cloudinary (image / file uploads) ──────────────────────
      # Get from: https://console.cloudinary.com/ → Settings → API Keys
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Stripe (payments) ───────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── PayPal (payments) ───────────────────────────────────────
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_CURRENCY
        value: "USD"

  # 2. Frontend Static Site running Vite React
  - type: web
    name: learning-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    # SPA rewrite: React Router owns client-side routing, so every non-asset
    # path must fall through to index.html. Without this, refreshing or
    # deep-linking to e.g. /courses/5 returns a 404 from Render's static server.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      # WebSocket base URL — set to wss://your-backend.onrender.com
      - key: VITE_WS_URL
        sync: false

  # 3. Redis Instance for Channels WebSockets
  - type: redis
    name: learning-platform-redis
    ipAllowList: [] # Only allow internal connections from backend

databases:
  # 4. PostgreSQL Database
  - name: learning-platform-db
    databaseName: online_platform
    user: online_user
