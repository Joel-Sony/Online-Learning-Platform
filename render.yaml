# Render Blueprint Specification
# This file lets you deploy the entire architecture (PostgreSQL, Redis, Daphne ASGI, React Frontend)
# on Render.com with a single click.

services:
  # 1. Backend Web Service running ASGI Daphne (HTTP + WebSockets)
  - type: web
    name: learning-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py generate_all_content && python manage.py download_thumbnails && daphne -b 0.0.0.0 -p $PORT core.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: learning-platform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: learning-platform-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

  # 2. Frontend Static Site running Vite React
  - type: web
    name: learning-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

  # 3. Redis Instance for Channels WebSockets
  - type: redis
    name: learning-platform-redis
    ipAllowList: [] # Only allow internal connections from backend

databases:
  # 4. PostgreSQL Database
  - name: learning-platform-db
    databaseName: online_platform
    user: online_user
