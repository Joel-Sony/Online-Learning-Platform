services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=online_platform
      - POSTGRES_USER=online_user
      - POSTGRES_PASSWORD=online_password

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://online_user:online_password@db:5432/online_platform
      - REDIS_URL=redis://redis:6379/1
      - EMAIL_HOST=mailpit
      - EMAIL_PORT=1025
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
    depends_on:
      - db
      - redis

  daphne:
    build: ./backend
    command: sh -c "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p 8001 core.asgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=postgres://online_user:online_password@db:5432/online_platform
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - daphne

volumes:
  postgres_data:

